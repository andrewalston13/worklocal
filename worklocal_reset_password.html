<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — WorkLocal</title>
  <link href="https://fonts.googleapis.com/css2?family=Chicle&family=Coiny&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="worklocal_config.js"></script>
  <script src="worklocal_auth.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#F7F7F5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
    .card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
    .logo{font-family:'Chicle',cursive;font-size:26px;margin-bottom:20px;}
    .logo .work{color:#3A6B28;}.logo .local{color:#93CF79;}
    .title{font-family:'Coiny',cursive;font-size:28px;color:#1A2E0F;margin-bottom:6px;}
    .sub{font-size:13px;color:#999;margin-bottom:24px;line-height:1.6;}
    input{width:100%;border:1.5px solid #E8E8E8;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:#222;outline:none;margin-bottom:12px;transition:border-color 0.12s;}
    input:focus{border-color:#93CF79;}
    .btn{width:100%;background:#93CF79;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.12s;}
    .btn:hover{background:#7AB865;}
    .btn:disabled{background:#C8E8A8;cursor:not-allowed;}
    .msg{border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:12px;display:none;}
    .msg.error{background:#FCEBEB;color:#791F1F;}
    .msg.success{background:#E2F5D6;color:#3A6B28;}
    .back{display:block;text-align:center;margin-top:16px;font-size:13px;color:#93CF79;text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="work">Work</span><span class="local">Local</span></div>
    <div class="title">Set new password</div>
    <div class="sub">Enter your new password below.</div>
    <div class="msg error" id="msg-error"></div>
    <div class="msg success" id="msg-success"></div>
    <input type="password" id="new-password" placeholder="New password (min 6 chars)"/>
    <input type="password" id="confirm-password" placeholder="Confirm new password"/>
    <button class="btn" id="reset-btn" onclick="resetPassword()">Update password</button>
    <a class="back" href="index.html">← Back to WorkLocal</a>
  </div>

  <script>
    async function resetPassword() {
      const errEl  = document.getElementById('msg-error');
      const sucEl  = document.getElementById('msg-success');
      const btn    = document.getElementById('reset-btn');
      const pass   = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!pass || pass.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block';
        return;
      }
      if (pass !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Updating...';
      btn.disabled    = true;

      try {
        const client = WLAuth.getClient();
        const { error } = await client.auth.updateUser({ password: pass });

        if (error) throw error;

        sucEl.textContent = 'Password updated! Redirecting to home...';
        sucEl.style.display = 'block';
        setTimeout(() => window.location.href = 'index.html', 2000);

      } catch(e) {
        errEl.textContent = e.message || 'Something went wrong. Try again.';
        errEl.style.display = 'block';
        btn.textContent = 'Update password';
        btn.disabled    = false;
      }
    }
  </script>
</body>
</html>
